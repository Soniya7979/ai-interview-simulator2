<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interview Simulator - Voice Mode</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>🎤 AI Interview Simulator</h1>
            <p>Voice-based mock interviews with AI feedback <a href="about.html" class="learn-more">Learn more →</a></p>
        </header>

        <section id="role-selection" class="section">
            <h2>Select Job Role</h2>
            <select id="role-select">
        <option value="frontend">Frontend Developer</option>
        <option value="backend">Backend Developer</option>
        <option value="fullstack">Fullstack Developer</option>
        <option value="devops">DevOps Engineer</option>
        <option value="data">Data Scientist</option>
      </select>
            <button id="start-interview">Start Interview</button>
        </section>

        <section id="interview-area" class="section hidden">
            <div class="status-bar">
                <span id="question-num">Question 1/10</span>
            </div>
            <div id="question-display" class="question-box"></div>
            <div class="controls">
                <button id="record-btn" class="mic-btn">🎤 Record Answer</button>
                <button id="submit-btn" class="submit-btn hidden">Get Feedback</button>
                <button id="next-btn" class="next-btn hidden">Next Question</button>
            </div>
            <div id="transcript" class="transcript-box hidden"></div>
            <div id="feedback" class="feedback-box hidden"></div>
            <button id="end-interview">End Interview</button>
        </section>

        <section id="history" class="section hidden">
            <h2>Interview History</h2>
            <ul id="history-list"></ul>
        </section>
    </div>

    <script src="auth.js"></script>
    <script src="script.js"></script>
</body>

</html>
